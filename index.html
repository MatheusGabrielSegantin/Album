<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/estilo.css">
    <title>Álbum</title>
</head>
<body>
<header>

    <div class="logo">
        <img src="assets/img/bolaheader.png" alt="">
        <p>FIFA</p>
    </div>

    <nav class="menu" id="inicio">
        <a href="#inicio">Início</a>
        <a href="#selecoes">Seleções</a>
        <a href="#progresso">Progresso</a>
    </nav>

</header>

    <main>
        <section class="banner">
            <img src="assets/img/banner.png" alt="banner">
            <h1>ÁLBUM<span>2026</span></h1>
            <p>COPA DO MUNDO FIFA</p>
        </section>

        <section class="cards" id="selecoes">
            <div class="brasil">
                <img src="assets/img/brasaobrasil.png" alt="Brasão do Brasil">
                <h3>Brasil</h3>
                <button>
                    <a href="selecaobrasileira.html">VER FIGURINHAS</a>
                </button>
            </div>

            <div class="japao">
                <img src="assets/img/brasaojapao.png" alt="Brasão do Japão">
                <h3>Japão</h3>
                <button>
                    <a href="selecao-japonesa.html">VER FIGURINHAS</a>
                </button>
            </div>
        </section>

        <h2>Progresso</h2>

        <div class="barra" id="progresso">
            <div class="progresso"></div>
            <span>25%</span>
        </div>
        
    </main>

    <footer>
        <img src="assets/img/bolaheader.png" alt="bola de futebol">
        <p>ÁLBUM <span>2026</span></p>
        <p class="copa">COPA DO MUNDO FIFA</p>
    </footer>
</body>
</html>
